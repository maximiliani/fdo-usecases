SPDX-License-Identifier = "CC0-1.0"

[[annotations]]
path = ["src/fdo_usecases/**", "tests/**"]
precedence = "aggregate"
SPDX-FileCopyrightText = "Copyright © 2026 Karlsruhe Institute of Technology (KIT)"
SPDX-License-Identifier = "Apache-2.0"
