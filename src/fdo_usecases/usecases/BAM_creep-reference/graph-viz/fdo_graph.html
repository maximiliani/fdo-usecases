        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            overflow: hidden;
            background: #f5f6fa;
        }

        #container {
            display: flex;
            height: 100vh;
        }

        #control-panel {
            width: 280px;
            background: #2c3e50;
            color: white;
            padding: 20px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        #graph-container {
            flex: 1;
            position: relative;
        }

        #cy {
            width: 100%;
            height: 100%;
        }

        #details-panel {
            position: absolute;
            top: 0;
            right: -450px;
            width: 450px;
            height: 100%;
            background: white;
            box-shadow: -2px 0 10px rgba(0,0,0,0.2);
            transition: right 0.3s ease;
            overflow-y: auto;
            z-index: 100;
        }

        #details-panel.open {
            right: 0;
        }

        .panel-header {
            background: #34495e;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header h3 {
            font-size: 18px;
            font-weight: 600;
        }

        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }

        .close-btn:hover {
            opacity: 0.8;
        }

        .panel-content {
            padding: 20px;
        }

        .control-section {
            margin-bottom: 25px;
        }

        .control-section h4 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            color: #bdc3c7;
        }

        .control-group {
            margin-bottom: 10px;
        }

        .control-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .control-group input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        select {
            width: 100%;
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            background: #34495e;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        select:focus {
            outline: 2px solid #3498db;
        }

        .btn {
            width: 100%;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 8px;
            transition: background 0.2s;
        }

        .btn-inline {
            width: auto;
            display: inline-block;
            margin-right: 8px;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background: #2980b9;
        }

        .btn-secondary {
            background: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
        }

        .btn-group {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }

        .btn-group .btn {
            flex: 1;
            margin-bottom: 0;
        }

        .btn-group .btn.active {
            background: #27ae60;
        }

        #search-input {
            width: 100%;
            padding: 10px 12px;
            border: none;
            border-radius: 4px;
            background: #34495e;
            color: white;
            font-size: 14px;
            margin-bottom: 10px;
        }

        #search-input::placeholder {
            color: #95a5a6;
        }

        #search-input:focus {
            outline: 2px solid #3498db;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .legend-node {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .legend-node.zenodo {
            background: #3498db;
            border-radius: 50%;
        }

        .legend-node.md5 {
            background: #2ecc71;
            border-radius: 2px;
        }

        .legend-node.handle {
            background: #e67e22;
            transform: rotate(45deg);
            border-radius: 2px;
            margin: 5px;
        }

        .legend-node.other {
            background: #9b59b6;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            width: 20px;
            height: 20px;
        }

        .legend-edge {
            width: 30px;
            height: 3px;
            flex-shrink: 0;
        }

        .legend-edge.version {
            background: #e74c3c;
        }

        .legend-edge.file {
            background: #27ae60;
        }

        .legend-edge.citation {
            background: #2980b9;
        }

        .legend-edge.other {
            background: #95a5a6;
        }

        .detail-row {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #ecf0f1;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-size: 12px;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 14px;
            color: #2c3e50;
            word-break: break-word;
        }

        .detail-value.pid {
            font-family: 'Courier New', monospace;
            background: #f8f9fa;
            padding: 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .profile-badge {
            display: inline-block;
            background: #3498db;
            color: white;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 12px;
            margin-right: 5px;
            margin-bottom: 5px;
        }

        .attribute-list {
            list-style: none;
        }

        .attribute-item {
            padding: 10px;
            background: #f8f9fa;
            border-radius: 4px;
            margin-bottom: 8px;
            border-left: 3px solid #3498db;
        }

        .attribute-key {
            font-weight: 600;
            color: #2c3e50;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .attribute-key-link {
            color: #3498db;
            text-decoration: none;
            border-bottom: 1px dotted #3498db;
            transition: all 0.2s;
        }

        .attribute-key-link:hover {
            color: #2980b9;
            border-bottom-color: #2980b9;
            background: rgba(52, 152, 219, 0.1);
        }

        .attribute-value {
            font-size: 12px;
            color: #7f8c8d;
            word-break: break-all;
            font-family: 'Courier New', monospace;
        }

        .attribute-values ul {
            list-style-type: disc;
            margin: 5px 0 0 20px;
            padding: 0;
        }

        .attribute-values li {
            margin-bottom: 4px;
        }

        .attribute-description {
            font-size: 11px;
            color: #95a5a6;
            margin-top: 4px;
            font-style: italic;
        }

        .stats-box {
            background: #34495e;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .stat-item:last-child {
            margin-bottom: 0;
        }

        .stat-label {
            color: #bdc3c7;
        }

        .stat-value {
            color: white;
            font-weight: 600;
        }

        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(44, 62, 80, 0.95);

            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
        }

        #loading-overlay.hidden {
            display: none;
        }

        .loading-text {
            font-size: 18px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .progress-container {
            width: 400px;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #3498db, #2ecc71);
            transition: width 0.3s ease;
            width: 0%;
        }

        .progress-percentage {
            margin-top: 10px;
            font-size: 14px;
            color: #bdc3c7;
        }



        .filter-checkbox {
            margin-bottom: 5px;
            padding: 4px 12px;
        }

        .filter-checkbox label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 13px;
        }

        .profile-group {
            margin-bottom: 10px;
            border: 1px solid #34495e;
            border-radius: 4px;
            overflow: hidden;
        }

        .profile-group-header {
            background: #34495e;
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            user-select: none;
        }

        .profile-group-header:hover {
            background: #3d566e;
        }

        .collapse-icon {
            font-size: 10px;
            width: 12px;
        }

        .group-name {
            flex: 1;
            font-weight: 600;
        }

        .group-count {
            color: #95a5a6;
            font-size: 12px;
        }

        .profile-group-members {
            background: #2c3e50;
            padding: 5px 0;
        }

        .profile-group-members .filter-checkbox {
            padding-left: 15px;
        }

        .profile-group-members .filter-checkbox.primary-profile {
            padding-left: 12px;
            font-weight: bold;
            border-left: 3px solid #3498db;
        }

        #supernode-stats {
            background: linear-gradient(135deg, #34495e 0%, #2c3e50 100%);
            border-left: 3px solid #e74c3c;
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="loading-text">Loading graph...</div>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="progress-percentage" id="progress-percentage">0%</div>
    </div>

    <div id="container">
        <div id="control-panel">
            <h2 style="margin-bottom: 20px; font-size: 20px;">FDO Graph Viewer</h2>

            <div class="stats-box" id="stats-box">
                <div class="stat-item">
                    <span class="stat-label">Nodes:</span>
                    <span class="stat-value" id="stat-nodes">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Edges:</span>
                    <span class="stat-value" id="stat-edges">-</span>
                </div>
            </div>

            <div class="stats-box" id="supernode-stats">
                <div class="stat-item">
                    <span class="stat-label">Super-nodes:</span>
                    <span class="stat-value" id="stat-supernodes">-</span>
                </div>
                <div class="stat-item" style="font-size: 11px; color: #95a5a6;">
                    <span>Threshold: ≥<span id="supernode-threshold">0</span> connections</span>
                </div>
            </div>

            <div class="control-section">
                <h4>Search</h4>
                <input type="text" id="search-input" placeholder="Search by PID or attribute...">
            </div>

            <div class="control-section">
                <h4><label for="layout-select">Layout</label></h4>
                <select id="layout-select">
                    <option value="cose">Force-Directed (CoSE)</option>
                    <option value="grid">Grid</option>
                    <option value="circle">Circle</option>
                    <option value="dagre">Hierarchical</option>
                </select>
            </div>

            <div class="control-section">
                <h4>Edge Labels</h4>
                <div class="btn-group">
                    <button class="btn btn-secondary" data-display="pid">PID</button>
                    <button class="btn btn-secondary active" data-display="name">Name</button>
                </div>
            </div>

            <div class="control-section">
                <h4>Show Details</h4>
                <div class="control-group">
                    <label>
                        <input type="checkbox" id="show-descriptions" checked>
                        Attribute descriptions
                    </label>
                </div>
            </div>

            <div class="control-section">
                <h4>Filter by Profile</h4>
                <div id="profile-filters">
                    <!-- Dynamically populated based on graph data -->
                </div>
            </div>

            <div class="control-section">
                <h4>Filter by Relationship</h4>
                <div id="relationship-filters">
                    <!-- Dynamically populated based on edge data -->
                </div>
            </div>

            <div class="control-section">
                <h4>Export</h4>
                <button class="btn btn-primary" id="export-svg">Export SVG</button>
                <button class="btn btn-primary" id="export-png">Export PNG</button>
            </div>
        </div>

        <div id="graph-container">
            <div id="cy"></div>
            <div id="details-panel">
                <div class="panel-header">
                    <h3>FDO Details</h3>
                    <button class="close-btn" id="close-details">&times;</button>
                </div>
                <div class="panel-content" id="details-content">
                    <p style="color: #95a5a6; text-align: center; margin-top: 50px;">
                        Click on a node to view details
                    </p>
                </div>
            </div>
        </div>
    </div>

8/076759916209e5d62bd5","value":"21.T11969/6c663a0695a411803d70"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:20d1b9eec092f6edcce75f56c41a0430"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:10318429e5179bda300249066bdbb3b0"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:ba495de3bd48f7fee78e1ab0f65d4a2d"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:0e6d9ef8a5f1f12dfed538ac6288eb5f"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:844cf37d100005a58ce4c35250351a35"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:0f44cd52bde1b15f78d2860ffdb72bac"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:124b59e34ca3c7af55d5b316790beac5"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:d7553459781320fa997e70ba7492a5e4"},{"key":"21.T11148/076759916209e5d62bd5","value":"21.T11969/077fe9c54ed5ed26fa54"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:1e5d421620f8746e93b30e4f5846ff5b"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:cdb111721844647b900f8d922c9d5d54"},{"key":"21.T11969/880724416f5857987e70","value":"This version replaces version 1.1 (January 2025). Changes compared to version 1.1 are listed at the end of this text. This publication provides comprehensive metadata and test results of constant force creep tests according to DIN EN ISO 204:2019-4 on the single crystal Ni-based superalloy CMSX-6 at T = 980 &deg;C and initial stresses between 140 MPa and 230 MPa. The tests were carried out in an ISO 17025-accredited testing laboratory. The calibrations of measuring equipment are documented, meet the requirements of the measurement standard, and are metrologically traceable. The data were audited and are BAM reference data. The publication of this reference dataset is part of the overarching framework for management of reference data presented in [1]. A data descriptor article accompanies this dataset publication [2]. Please consider citing these works [1,2] if you use the data for a scientific publication. The data can be useful for verifying one&rsquo;s own creep test results on nominally similar material, for verifying one&rsquo;s own test set-up (e.g., by testing the same or a similar material), and as input data for simulations of the creep behavior in mechanical design or alloy development. There are currently no known restrictions on the use of the data. The data are provided using v2.0 of the &ldquo;NFDI-MatWerk/IUC02 Data schema for creep data of Ni-based superalloys including a comprehensive documentation of test results and metadata&rdquo; [3] as a template for data documentation and structuring. The provided data fully meets the requirement profile (mandatory fields in the column &ldquo;Requirement&rdquo; of the data schema). The requirement profile was agreed upon by domain experts. An XLSX file &ldquo;2026-03_Creep-reference-data-CMSX-6_v2.0.xlsx&rdquo;, *.lis files (ASCII format), and further supplementary files (PDF, JPG, TIF) are provided. The XLSX file contains metadata and test results that are valid for the entire test campaign in the worksheet named &ldquo;Common-to-all&rdquo;, as well as selected test results for the individual test pieces in the worksheets that are named according to the respective test ID. The metadata and test results, i.e., the responses to the individual fields of the data schema [3], are provided in the last column, labeled as &ldquo;Information&rdquo;. In the XLSX file, selected responses refer to further files. Overall, all mandatory entries (see column &ldquo;Requirement&rdquo;) are provided. The intended usage linked to the implemented requirement profile is described in [3]. There are four types of *.lis files (ASCII format): Files starting with &ldquo;Vh5205_MD-TR_...&rdquo;: The content of these files corresponds to the content of the individual worksheets of the XLSX file &ldquo;2026-03_Creep-reference-data-CMSX-6_v2.0.xlsx&rdquo; containing metadata (MD) and test results (TR). Files of type &ldquo;Vh5205_C-XY-Creep.LIS&rdquo;, where XY corresponds to the respective test ID: These files contain a header with selected mandatory metadata and test results. Below the header, the mandatory data series representing the creep response of the material is provided. Files of type &ldquo;Vh5205_C-XY-Loading.LIS&rdquo;, where XY corresponds to the respective test ID: These files contain the mandatory data series corresponding to the loading phase. Files starting with &ldquo;Vh5205_Complementary_...&rdquo;: Complementary files. In the XLSX file, selected responses refer to these files...."},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:c6199e7bb64e1ebd35ecaa9e1b6796af"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:98cadcedf48ba8d838542b930ef570e3"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:b357fdeb5dd5fa3457517b957f1fdbc1"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:bef806111786f889a7fcff8d18e7e80d"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:26b99a055e11d0496f7128279874f0d9"},{"key":"21.T11969/7c67083a5d218e544063","value":"https://orcid.org/0000-0003-0727-5499"},{"key":"21.T11969/7c97f00a2a95826c1a8f","value":"10.5281/zenodo.14750432"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:6ddd1701fb6c6c89a0bd61093911e107"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:7b1bb9852b761c925aad9839f6bb66ba"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:304c8173812684e934ff78ea7b4e46ec"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:0cb87d6a96773ed87b297a79228fcb36"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:71308114049fdfba6830b5cdade92cf5"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:0f19309dac621c8ae3bc45e13827bb7b"},{"key":"21.T11969/925e3f9925a88476ffba","value":"https://zenodo.org/api/records/18933930/files/Test-piece-location_v2.0.jpg/content"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:69565c0084378c8797c850ef639491f7"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:748db68cc1478138f3d2c7a ment standard, and are metrologically traceable. The data were audited and are BAM reference data. The publication of this reference dataset is part of the overarching framework for management of reference data presented in [1]. A data descriptor article accompanies this dataset publication [2]. Please consider citing these works [1,2] if you use the data for a scientific publication. The data can be useful for verifying one&rsquo;s own creep test results on nominally similar material, for verifying one&rsquo;s own test set-up (e.g., by testing the same or a similar material), and as input data for simulations of the creep behavior in mechanical design or alloy development. There are currently no known restrictions on the use of the data. The data are provided using v2.1 of the &ldquo;NFDI-MatWerk/IUC02 Data schema for creep data of Ni-based superalloys including a comprehensive documentation of test results and metadata&rdquo; [3] as a template for data documentation and structuring. The provided data fully meets the requirement profile (mandatory fields in the column &ldquo;Requirement&rdquo; of the data schema). The requirement profile was agreed upon by domain experts. An XLSX file &ldquo;Vh5205_Creep-reference-data-CMSX-6_v2.1.xlsx&rdquo;, *.lis files (ASCII format), JSON files, and further supplementary files (PDF, JPG, TIF) are provided. The XLSX file contains metadata and test results that are valid for the entire test campaign, as well as selected test results for the individual tests. Worksheets are named according to the respective test ID. Whether the information contained in an entry is common to all tests is documented with a * symbol in the last column &ldquo;Information common to all (*)&rdquo;. The metadata and test results, i.e., the responses to the individual fields of the data schema [3], are provided in the column labeled as &ldquo;Information&rdquo;. Selected responses refer to further files. Overall, all mandatory entries (see column &ldquo;Requirement&rdquo;) are provided. The usage that is intended for the data and defines the implemented requirement profile is described in [3]. Five types of *.lis files (ASCII format) are provided: Files &ldquo;Vh5205_C-XY-MD-TR.LIS&rdquo;, where XY corresponds to the respective test ID: The content of these files corresponds to the content of the individual worksheets of the XLSX file &ldquo;Vh5205_Creep-reference-data-CMSX-6_v2.1.xlsx&rdquo; containing metadata (MD) and test results (TR). Files of type &ldquo;Vh5205_C-XY-Creep.LIS&rdquo;, where XY corresponds to the respective test ID: These files contain a header with selected mandatory metadata and test results. Below the header, the mandatory data series that represents the material's creep response is provided. Files of type &ldquo;Vh5205_C-XY-Loading.LIS&rdquo;, where XY corresponds to the respective test ID: These files contain..."},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:124b59e34ca3c7af55d5b316790beac5"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:cb9de3af641b6eea45f34ca713e764a5"},{"key":"21.T11969/793ff5c33c3aeb32907a","value":"creep test"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:7be2efcc5c2a0789c0a5bfd12c8212df"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:712b7b6341abd1fc43d3506bb88ea9bb"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:bef806111786f889a7fcff8d18e7e80d"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:142fdd4e9691a4c26f65c9eda91ceb80"},{"key":"21.T11969/7c97f00a2a95826c1a8f","value":"10.5281/zenodo.18933930"},{"key":"21.T11969/46b995a19dd6f5d36d0d","value":"{\"relationshipPredicate\": \"describes\", \"target\": \"10.5281/zenodo.14750432\"}"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:f0494a4356e853f322a490a97d51eca5"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:db46e8a671eeb2abf04ee88760780d40"},{"key":"21.T11969/29f92bd203dd3eaa5a1f","value":"2026-05-12"},{"key":"21.T11969/7c67083a5d218e544063","value":"https://or elated hierarchy of concepts. This hierarchy can be similarly applied toother test methods and different metallic (and other) materials. In version 1.1 some editorial and formal changes were made."},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:ce681eb2a7e297012472a7a51c838bfa"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:008b132bb55a312aeae75644c0e4c945"},{"key":"21.T11969/ea9f6b3d78c6608fe801","value":"https://ror.org/03x516a66"},{"key":"21.T11969/7c67083a5d218e544063","value":"https://orcid.org/0009-0001-8975-2609"},{"key":"21.T11969/7c67083a5d218e544063","value":"https://orcid.org/0000-0002-2296-4930"},{"key":"21.T11969/ea9f6b3d78c6608fe801","value":"https://ror.org/04tsk2644"},{"key":"21.T11969/be1ae3492b235faad933","value":"1.1"},{"key":"21.T11969/ea9f6b3d78c6608fe801","value":"https://ror.org/04t3en479"},{"key":"21.T11969/7c67083a5d218e544063","value":"https://orcid.org/0000-0003-0012-2414"},{"key":"21.T11969/bd3e9fb9b606d2198c9e","value":"NFDI-MatWerk/IUC02 Data schema for creep data of Ni-based superalloys including a comprehensive  documentation of test results and metadata"},{"key":"21.T11969/8710d753ad10f371189b","value":"https://doi.org/10.5281/zenodo.13820070"},{"key":"21.T11148/076759916209e5d62bd5","value":"21.T11969/6c663a0695a411803d70"},{"key":"21.T11969/29f92bd203dd3eaa5a1f","value":"2024-09-20"},{"key":"21.T11969/7c97f00a2a95826c1a8f","value":"10.5281/zenodo.11668376"},{"key":"21.T11148/076759916209e5d62bd5","value":"21.T11969/077fe9c54ed5ed26fa54"},{"key":"21.T11969/ea9f6b3d78c6608fe801","value":"https://ror.org/0245cg223"},{"key":"21.T11969/ea9f6b3d78c6608fe801","value":"https://ror.org/05r3f7h03"},{"key":"21.T11969/2b4d6ceda80ddd63f7a9","value":"10.5281/zenodo.20132382"},{"key":"21.T11969/7f1a6afddcfeefbf195b","value":"10.5281/zenodo.17975526"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:6d33f245a541d895be358ddea78bfca4"},{"key":"21.T11969/7c67083a5d218e544063","value":"https://orcid.org/0000-0003-0727-5499"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:e9118168d9c923f42bca91033f94d6c0"}],"pid":"10.5281/zenodo.13820070"},"10.5281/zenodo.17975526":{"record":[{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:5c682614f82f85b41bcc56a6d18b3d82"},{"key":"21.T11969/be1ae3492b235faad933","value":"2.0"},{"key":"21.T11969/ea9f6b3d78c6608fe801","value":"https://ror.org/03x516a66"},{"key":"21.T11969/7c67083a5d218e544063","value":"https://orcid.org/0009-0001-8975-2609"},{"key":"21.T11969/7c67083a5d218e544063","value":"https://orcid.org/0000-0002-2296-4930"},{"key":"21.T11969/793ff5c33c3aeb32907a","value":"data schema"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:9825274e6375d749b9b4a489d9e7819c"},{"key":"21.T11969/ea9f6b3d78c6608fe801","value":"https://ror.org/04tsk2644"},{"key":"21.T11969/7f1a6afddcfeefbf195b","value":"10.5281/zenodo.20132382"},{"key":"21.T11969/ea9f6b3d78c6608fe801","value":"https://ror.org/04t3en479"},{"key":"21.T11969/880724416f5857987e70","value":"This version replaces version v1.1 (September 2024). Changes compared to v1.1 are summarized at the end of this description. Creep testing of metallic materials for high temperature applications, e.g., in turbines and power plants, yields valuable datasets. High experimental efforts are necessary to ensure stable high temperature and constant loading conditions in these long-running tests. Proper, comprehensive documentation of these experiments is a key element to enable the assessment of the quality of respective creep datasets and their targeted use (and future re-use) for specific applications. The attached data schema for creep tests was developed within the German NFDI-MatWerk initiative (https://nfdi-matwerk.de/) and follows the reference data methodology outlined in [1]. Please consider citing this work [1] if you use the data schema for a scientific publication. With the data schema, it is intended to define a structured approach for collecting all required information on a creep experiment using the established terminology of the respective test standard ISO&nbsp;204:2022. The development goals encompass the following primary aspects: To ensure a comprehensive description with a hierarchical data structure that can be implemented to data management platforms, To define a scope of documentation that allows the assessment of a dataset&rsquo;s quality by different end users who retrieve datasets from multiple data providers, To foster the exchange of high-quality creep datasets according to the FAIR principles [2], by providing easy interoperability and full reusability.&middot;&nbsp;&nbsp; The data schema was originally developed for datasets of Ni-based high-temperature alloys. It is not intended to be exhaustive. However, the data schema is largely agnostic to the type of material and may be adapted or extended to accommodate additional parameters or test variants, or for creep testing of different metallic (and other) materials. This version of the data schema covers creep tests with the following features: It considers single- and polycrystalline material Terminology is aligned with ISO 204:2022 Creep test under tension and constant force Temperature measurement with thermocouples Contacting extensometer system A very detailed approach was chosen to ensure the collection of all related pieces of information, e.g., including a complete description of the material&rsquo;s manufacturing history and a comprehensive description of the laboratory equipment. In this way, the developed data schema serves to describe or identify high-quality datasets, which can be considered as reference data of materials for verification purposes. It is acknowledged that certain datasets, depending on their origin and intended use, may not require this full depth of documentation. Still, the suggested data schema can help to decide which parts of information are relevant for the respective purpose. The authors encourage the materials science and engineering, and especially the creep community to provide any feedback that can lead to optimizing the data schema, including its structure. Future versions could include, for instance, modules for non-contacting extensometer methods or temperature measurement with thermal imaging cameras. The data schema is provided in the following formats: XLSX, CSV and JSON, and it is also available in a git repository (https://git.rwth-aachen.de/nfdi-matwerk/iuc02). The XLSX/CSV version of the data schema contains 12..."},{"key":"21.T11969/7c67083a5d218e544063","value":"https://orcid.org/0000-0003-0012-2414"},{"key":"21.T11969/bd3e9fb9b606d2198c9e","value":"NFDI-MatWerk/IUC02 Data schema for creep data of Ni-based superalloys including a comprehensive  documentation of test results and metadata"},{"key":"21.T11148/076759916209e5d62bd5","value":"21.T11969/6c663a0695a411803d70"},{"key":"21.T11969/7c97f00a2a95826c1a8f","value":"10.5281/zenodo.13820070"},{"key":"21.T11148/076759916209e5d62bd5","value":"21.T11969/077fe9c54ed5ed26fa54"},{"key":"21.T11969/ea9f6b3d78c6608fe801","value":"https://ror.org/0245cg223"},{"key":"21.T11969/ea9f6b3d78c6608fe801","value":"https://ror.org/05r3f7h03"},{"key":"21.T11969/793ff5c33c3aeb32907a","value":"creep test"},{"key":"21.T11969/793ff5c33c3aeb32907a","value":"Ni-based superalloy"},{"key":"21.T11969/2b4d6ceda80ddd63f7a9","value":"10.5281/zenodo.20132382"},{"key":"21.T11969/813e06c1441327b72e68","value":"10.1016/j.actamat.2025.120735"},{"key":"21.T11969/7c67083a5d218e544063","value":"https://orcid.org/0000-0003-0727-5499"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:387c505977ca8f31fffa7d9234c468f0"},{"key":"21.T11969/29f92bd203dd3eaa5a1f","value":"2025-12-18"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:1314060484d02661b382b09ec0bb0c2c"},{"key":"21.T11969/8710d753ad10f371189b","value":"https://doi.org/10.5281/zenodo.17975526"}],"pid":"10.5281/zenodo.17975526"},"10.5281/zenodo.20132382":{"record":[{"key":"21.T11969/8710d753ad10f371189b","value":"https://doi.org/10 es for non-contacting extensometer methods or temperature measurement with thermal imaging cameras. The data schema is provided in the following formats: XLSX, *.lis, and JSON, and it is also available in a git repository (https://git.rwth-aachen.de/nfdi-matwerk/iuc02). The XLSX/*.lis version of the data schema contains..."},{"key":"21.T11969/7c67083a5d218e544063","value":"https://orcid.org/0000-0003-0012-2414"},{"key":"21.T11969/bd3e9fb9b606d2198c9e","value":"NFDI-MatWerk/IUC02 Data schema for creep data of Ni-based superalloys including a comprehensive  documentation of test results and metadata"},{"key":"21.T11148/076759916209e5d62bd5","value":"21.T11969/6c663a0695a411803d70"},{"key":"21.T11148/076759916209e5d62bd5","value":"21.T11969/077fe9c54ed5ed26fa54"},{"key":"21.T11969/ea9f6b3d78c6608fe801","value":"https://ror.org/0245cg223"},{"key":"21.T11969/ea9f6b3d78c6608fe801","value":"https://ror.org/05r3f7h03"},{"key":"21.T11969/793ff5c33c3aeb32907a","value":"creep test"},{"key":"21.T11969/793ff5c33c3aeb32907a","value":"Ni-based superalloy"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:38f694f553d749860d9f3c936301883d"},{"key":"21.T11969/7c67083a5d218e544063","value":"https://orcid.org/0000-0003-0727-5499"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:2a23846d476c502ab7f81b03a29a4a04"},{"key":"21.T11969/46b995a19dd6f5d36d0d","value":"{\"relationshipPredicate\": \"cites\", \"target\": \"10.5281/zenodo.20132382\"}"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:c4852bbfe1dd0ed816f95dcf5101d519"}],"pid":"10.5281/zenodo.20132382"},"md5:282ecf5411a97b8ad8da14acc5a43313":{"record":[{"key":"21.T11148/076759916209e5d62bd5","value":"21.T11969/6c663a0695a411803d70"},{"key":"21.T11148/076759916209e5d62bd5","value":"21.T11969/0738c2ef35faef0fb552"},{"key":"21.T11969/30f4a1f8aacab81faf38","value":"10.5281/zenodo.11668376"},{"key":"21.T11148/076759916209e5d62bd5","value":"21.T11969/077fe9c54ed5ed26fa54"},{"key":"21.T11969/479febb2bbe8400da547","value":"http ally traceable. The provided data were audited and are BAM reference data. The preparation of this reference dataset adhered to the guidelines&nbsp;for the management of reference data described in&nbsp;[1]. Please consider citing this work [1] if you use the data for a scientific publication. These data can be useful for verifying one&rsquo;s own tensile test results on a nominally similar material, for verifying one&rsquo;s own test setup (e.g., by testing the same or a similar material), and as input data for simulations of tensile or creep behavior in mechanical design or alloy development. There are currently no known restrictions on the use of the data. The data are provided using v1.0 of the &ldquo;NFDI-MatWerk/IUC02 Data schema for elevated temperature tensile data of Ni-based superalloys&rdquo; [2] as a template for data documentation and structuring. The provided data fully meets the requirement profile (mandatory fields in the column &ldquo;Requirement&rdquo; of the data schema). The requirement profile was agreed between domain experts. A XLSX file (&ldquo;2025-12_HT-Tensile-reference-data-CMSX-6_v1.0.xlsx&rdquo;), *.lis files (ASCII format), and supplementary images (PDF, JPG, TIF) are provided. The XLSX file contains metadata and selected test results that are valid for the entire test campaign (worksheet &ldquo;Common-to-all&rdquo;), as well as selected test results for the individual test pieces (worksheets named according to the respective test ID). The metadata and test results, i.e., the responses to the individual fields of the data schema [2], are provided in the last column, labeled as &ldquo;Information&rdquo;. Some responses refer to further worksheets in the same XLSX&nbsp;file. The *.lis files (ASCII format) contain a header with selected mandatory metadata and test results. Below the header, the mandatory data series are provided. The decimal point setting is based on the specifications of DIN EN ISO 6892-1:2020-06 and DIN EN ISO 6892-2:2018-09 [3,4], and the resolution of the measuring devices. The total expanded uncertainty of measurement for tensile strength (Rm), proof strength (Rp0.2), and percentage reduction of area (Z) was determined according to DIN EN ISO 6892-1:2020-06 [3] for each test. The maximum values are given below in Table 1. The maximum temperature deviations observed were&nbsp; -0.4 &deg;C between the indicated, Ti, and the specified, T, temperatures, and 0.5&deg;C (Ti) across the sample&rsquo;s parallel length. Table 1. Maximum total expanded uncertainty of measurement according to DIN EN ISO 6892-1:2020-06 [3] for a 95 % level of confidence, k = 2. Rm: Tensile strength, Rp0.2: proof strength, Z: percentage reduction of area. &plusmn; URm &nbsp;% (Rm) [MPa] &plusmn; URp0.2 % (Rp0.2) [MPa] &plusmn; Uz % (Z) [%] % % % 1.2 1.2 max. 0.5 &nbsp; References [1] L.A. &Aacute;vila Calder&oacute;n, Y. Shakeel, A. Gedsun, M. Forti, S. Hunke, Y. Han, T. Hammerschmidt, R...."},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:554a397d927779435b9ae8dea393123f"},{"key":"21.T11969/793ff5c33c3aeb32907a","value":"elevated temperature tensile test"},{"key":"21.T11969/be1ae3492b235faad933","value":"1.0"},{"key":"21.T11969/7c67083a5d218e544063","value":"https://orcid.org/0000-0003-0727-5499"},{"key":"21.T11969/925e3f9925a88476ffba","value":"https://zenodo.org/api/records/17846617/files/Dendrite-overview.jpg/content"},{"key":"21.T11969/29f92bd203dd3eaa5a1f","value":"2025-12-18"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:c97a17cdd139e928d0134a4697f61073"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:f4f0f1d219ac0f66df753cabe0b79684"},{"key":"21.T11969/793ff5c33c3aeb32907a","value":"reference data"},{"key":"21.T11969/8710d753ad10f371189b","value":"https://doi.org/10.5281/zenodo.17846617"}],"pid":"10.5281/zenodo.17846617"},"md5:f3c9defb8cb3e11d8de9cad849e3eb7c":{"record":[{"key":"21.T11148/076759916209e5d62bd5","value":"21.T11969/6c663a0695a411803d70"},{"key":"21.T11969/30f4a1f8aac 3e9fb9b606d2198c9e","value":"Vh5205_T-84.LIS"},{"key":"21.T11969/a80ed2ef79e22f1d8af8","value":"md5:763fdfb2ac9406518fb560188f5f8dd4"},{"key":"21.T11969/8710d753ad10f371189b","value":"https://doi.org/10.5281/zenodo.17846617"}],"pid":"md5:763fdfb2ac9406518fb560188f5f8dd4"},"10.5281/zenodo.17846436":{"record":[{"key":"21.T11969/8710d753ad10f371189b","value":"https://doi.org/10.5281/zenodo.17846436"},{"key":"21.T11969/29f92bd203dd3eaa5a1f","value":"2025-12-08"},{"key":"21.T11969/880724416f5857987e70","value":"Strength characteristics, such as proof strength and tensile strength, of metallic materials are usually measured at room temperature. However, for high-temperature materials, the values at operational temperatures are equally important for analyzing the mechanical behavior of components [1] or for designing purposes. Elevated temperature tensile tests (often referred to as hot tensile tests) generally enable the measurement of the same material parameters as those obtained at room temperature [1]. Typically, tensile and proof strength, elongation after fracture, and reduction of area are analyzed, with the focus often being on proof strength [1]. The attached data schema for elevated temperature tensile tests was developed within the German NFDI-MatWerk initiative (https://nfdi-matwerk.de/). It builds on the previously published creep data schema [2] and follows the reference data methodology outlined in&nbsp;[3]. Please consider citing this work [3] if you use the data schema for a scientific publication. The presented schema constitutes a structured approach for collecting all relevant information on an elevated temperature tensile test experiment. Overall, this development, as defined in the previously published data schema for creep data [2], aims to provide a comprehensive hierarchical data description that can be implemented in data management platforms (such as electronic laboratory notebooks), facilitate consistent quality assessment across different users and data providers, and promote the alignment of datasets to the FAIR principles by providing easy interoperability and full reusability. The presented schema was initially developed for datasets of Ni-based high-temperature alloys. However, thanks to its modular structure, it can also be applied to tensile tests of various metallic and other materials. Although the focus is on elevated temperature tensile testing, the data schema also offers a solid foundation for documenting room temperature tensile tests. In such cases, an adjustment of the requirement profile might be necessary, and categories or entries specific to mechanical testing at elevated temperatures, such as &ldquo;temperature-measuring system&rdquo;, &ldquo;specified temperature&rdquo;, or &ldquo;soaking time&rdquo;, become irrelevant. Overall, a detailed approach was followed to ensure the collection of all relevant information, including both metadata and test results. This includes, for example, comprehensive descriptions of the material&rsquo;s manufacturing history and of the laboratory equipment, and basic strength and deformation characteristic values. The resulting data schema aims to support the description and identification of high-quality datasets, which may qualify as reference data of materials. Our current definition of reference data of materials is available in [4]. It should be noted, however, that not all research datasets &mdash;depending on their origin and purpose&mdash; require this full level of detail. Nevertheless, the presented data schema can support data providers in evaluating the completeness and value of their datasets. This version of the data schema covers elevated temperature tensile tests on both single- and polycrystalline specimen materials. The terminology is aligned with DIN EN ISO 6892-1 and DIN EN ISO 6892-2 [4,5]. It is designed to record the use of temperature measurement using thermocouples and the use of contacting extensometer systems. The data schema is provided in XLSX and CSV formats. It comprises 11 columns. The columns labeled..."},{"key":"21.T11969/ea9f6b3d78c6608fe801","value":"https://ror.org/03x516a66"},{"key":"21.T11969/7c67083a5d218e544063","value":"https://orcid.org/0009-0001-8975-2609"},{"key":"21.T11969/7c67083a5d218e544063","value":"https://orcid.org/0000-0002-2296-4930"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:330a8405f6cb9c4fcfe221baea7ced27"},{"key":"21.T11969/46b995a19dd6f5d36d0d","value":"{\"relationshipPredicate\": \"cites\", \"target\": \"10.5281/zenodo.17846436\"}"},{"key":"21.T11969/793ff5c33c3aeb32907a","value":"data schema"},{"key":"21.T11969/bd3e9fb9b606d2198c9e","value":"NFDI-MatWerk/IUC02 Data schema for elevated temperature tensile data of Ni-based superalloys"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:be4cdcde938753c448e1bec239480c82"},{"key":"21.T11969/7c67083a5d218e544063","value":"https://orcid.org/0000-0003-0012-2414"},{"key":"21.T11148/076759916209e5d62bd5","value":"21.T11969/6c663a0695a411803d70"},{"key":"21.T11148/076759916209e5d62bd5","value":"21.T11969/077fe9c54ed5ed26fa54"},{"key":"21.T11969/793ff5c33c3aeb32907a","value":"elevated temperature tensile test"},{"key":"21.T11969/be1ae3492b235faad933","value":"1.0"},{"key":"21.T11969/7c67083a5d218e544063","value":"https://orcid.org/0000-0003-0727-5499"},{"key":"21.T11969/793ff5c33c3aeb32907a","value":"reference data"},{"key":"21.T11969/39c056d0cc63e2d0ff17","value":"md5:3b5aa58ce87e8fdf821d51569ee80f57"}],"pid":"10.5281/zenodo.17846436"},"md5:be4cdcde938753c448e1bec239480c82":{"record":[{"key":"21.T11969/a80ed2ef79e22f1d8af8","value":"md5:be4cdcde938753c448e1bec239480c82"},{"key":"21.T11969/8710d753ad10f371189b","value":"https://doi.org/10.5281/zenodo.17846436"},{"key":"21.T11148/076759916209e5d62bd5","value":"21.T11969/6c663a0695a411803d70"},{"key":"21.T11969/bd3e9fb9b606d2198c9e","value":"2025-12_Data-Schema-Tensile-HT_v1.0.xlsx"},{"key":"21.T11969/30f4a1f8aacab81faf38","value":"10.5281/zenodo.17846436             const a = s * Math.min(l, 1 - l);
            const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
            return { r: Math.round(f(0) * 255), g: Math.round(f(8) * 255), b: Math.round(f(4) * 255) };
        }

        function rgbToHsl(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            if (max === min) {
                h = s = 0;
            } else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }
            return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
        }

        function blendColorsWeighted(profiles, stats) {
            if (profiles.length === 0) return '#95a5a6';
            if (profiles.length === 1) {
                const hsl = getProfileHSL(profiles[0]);
                return `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;
            }

            const weightedProfiles = profiles.map(pid => ({
                pid,
                color: getProfileHSL(pid),
                weight: getProfileWeight(stats.frequencyMap.get(pid), stats)
            }));

            const mostSpecific = weightedProfiles.reduce((max, p) =>
                p.weight > max.weight ? p : max, weightedProfiles[0]
            );

            const dominantWeight = 0.8;
            const otherWeight = 0.2 / (weightedProfiles.length - 1);

            let totalR = 0, totalG = 0, totalB = 0;

            weightedProfiles.forEach(p => {
                const rgb = hslToRgb(p.color.h, p.color.s, p.color.l);
                const w = p.pid === mostSpecific.pid ? dominantWeight : otherWeight;
                totalR += rgb.r * w;
                totalG += rgb.g * w;
                totalB += rgb.b * w;
            });

            const blended = rgbToHsl(
                Math.round(totalR),
                Math.round(totalG),
                Math.round(totalB)
            );

            return `hsl(${blended.h}, ${blended.s}%, ${blended.l}%)`;
        }

        function extractProfilePids(recordArray) {
            const PROFILE_KEY = '21.T11148/076759916209e5d62bd5';
            return recordArray
                .filter(attr => attr.key === PROFILE_KEY)
                .map(attr => attr.value);
        }

        function groupAttributesByKey(recordArray) {
            const grouped = {};
            recordArray.forEach(attr => {
                if (!grouped[attr.key]) {
                    grouped[attr.key] = [];
                }
                grouped[attr.key].push(attr.value);
            });
            return Object.entries(grouped).map(([key, values]) => ({
                k: key,
                v: values.length > 1 ? values : values[0],
                c: values.length
            }));
        }

        function buildCytoscapeElements() {
            const elements = [];
            const allPids = Object.keys(RAW_GRAPH_DATA);

            // Create nodes
            Object.entries(RAW_GRAPH_DATA).forEach(([pid, recordData]) => {
                const recordArray = recordData.record || [];
                const profilePids = extractProfilePids(recordArray);
                const groupedAttrs = groupAttributesByKey(recordArray);

                const node = {
                    data: {
                        id: pid,
                        label: truncatePid(pid),
                        full_pid: pid,
                        profiles: profilePids,
                        attrs: groupedAttrs
                    },
                };
                elements.push(node);
            });

            // Create edges: AUTOMATIC RELATIONSHIP DETECTION
            // Rule: If attribute.value == another FDO's PID → relationship exists
            // Special case: namedReference stores target in JSON structure
            Object.entries(RAW_GRAPH_DATA).forEach(([sourcePid, recordData]) => {
                const recordArray = recordData.record || [];

                recordArray.forEach(attr => {
                    let targetValue = attr.value;

                    // Check if this is a namedReference complex attribute
                    if (typeof attr.value === 'string' && attr.value.startsWith('{')) {
                        try {
                            const parsed = JSON.parse(attr.value);
                            if (parsed.relationshipPredicate && parsed.target) {
                                targetValue = parsed.target;
                            }
                        } catch (e) {
                            // Not valid JSON, use original value
                        }
                    }

                    const isRelationship = allPids.includes(targetValue);

                    if (isRelationship) {
                        const edge = {
                            data: {
                                source: sourcePid,
                                target: targetValue,
                                k: attr.key,
                                predicate: typeof attr.value === 'string' && attr.value.startsWith('{')
                                    ? (() => {
                                        try {
                                            return JSON.parse(attr.value).relationshipPredicate;
                                        } catch (e) {
                                            return null;
                                        }
                                    })()
                                    : null
                            }
                        };
                        elements.push(edge);
                    }
                });
            });

            return { elements };
        }

        async function resolveAttributeName(attrKeyPid) {
            if (attrMetaCache.has(attrKeyPid)) {
                return attrMetaCache.get(attrKeyPid);
            }

            try {
                const handleNetUrl = `https://hdl.handle.net/api/handles/${encodeURIComponent(attrKeyPid)}?noredirect=true`;
                const response = await fetch(handleNetUrl);

                if (!response.ok) {
                    console.warn(`Failed to fetch ${attrKeyPid}: ${response.status}`);
                    return { name: truncatePid(attrKeyPid, 25), description: '' };
                }

                const record = await response.json();

                if (!record.values || record.values.length === 0) {
                    return { name: truncatePid(attrKeyPid, 25), description: '' };
                }

                let name = '';
                let description = '';

                const locationEntry = record.values.find(v => v.type === '10320/loc');
                if (locationEntry?.data?.value) {
                    try {
                        const parser = new DOMParser();
                        const xmlDoc = parser.parseFromString(locationEntry.data.value, 'text/xml');
                        const locations = xmlDoc.getElementsByTagName('location');

                        for (let j = 0; j < locations.length; j++) {
                            const href = locations[j].getAttribute('href');
                            const view = locations[j].getAttribute('view');

                            if (view === 'json' && href) {
                                const epicResponse = await fetch(href);
                                if (epicResponse.ok) {
                                    const epicJson = await epicResponse.json();
                                    name = epicJson['name'] || '';
                                    description = epicJson['description'] || '';
                                    console.log(`Resolved ${attrKeyPid}: ${name}`);
                                    break;
                                }
                            }
                        }
                    } catch (e) {
                        console.warn(`Failed to parse location XML for ${attrKeyPid}:`, e);
                    }
                }

                if (!name || !description) {
                    for (const val of record.values) {
                        const typeStr = val.type || '';
                        const dataValue = val.data?.value || '';

                        if (!name && (typeStr.includes('bd3e9fb9b606d2198c9e') ||
                            typeStr.toLowerCase().includes('name') ||
                            typeStr.toLowerCase().includes('title'))) {
                            name = dataValue;
                        }

                        if (!description && (typeStr.includes('880724416f5857987e70') ||
                            typeStr.toLowerCase().includes('description'))) {
                            description = dataValue;
                        }
                    }
                }

                const meta = { name: name || truncatePid(attrKeyPid, 25), description };
                attrMetaCache.set(attrKeyPid, meta);
                return meta;
            } catch (error) {
                console.warn(`Failed to resolve ${attrKeyPid}:`, error);
            }

            return { name: truncatePid(attrKeyPid, 25), description: '' };
        }

        class Semaphore {
            constructor(count) {
                this.count = count;
                this.queue = [];
            }

            acquire() {
                return new Promise(resolve => {
                    if (this.count > 0) {
                        this.count--;
                        resolve();
                    } else {
                        this.queue.push(resolve);
                    }
                });
            }

            release() {
                this.count++;
                if (this.queue.length > 0) {
                    this.count--;
                    this.queue.shift()();
                }
            }
        }

        async function preloadAttributeMetadata(cytoscapeElements) {
            const allAttrKeys = new Set();
            const profilePids = new Set();

            Object.values(RAW_GRAPH_DATA).forEach(recordData => {
                const recordArray = recordData.record || [];

                const profiles = extractProfilePids(recordArray);
                profiles.forEach(p => profilePids.add(p));

                recordArray.forEach(attr => {
                    if (attr.key) {
                        allAttrKeys.add(attr.key);
                    }
                });
            });

            const uniqueAttrKeys = new Set([...allAttrKeys, ...profilePids]);

            const totalToResolve = uniqueAttrKeys.size;
            let resolvedCount = 0;

            if (totalToResolve === 0) {
                return;
            }

            console.log(`Resolving ${totalToResolve} unique PIDs (${allAttrKeys.size} attributes + ${profilePids.size} profiles)...`);
            updateLoading(3, 0);

            const batchSize = 20;
            const maxConcurrent = 5;
            const keysArray = Array.from(uniqueAttrKeys);

            async function resolveBatchWithConcurrency(batch) {
                const semaphore = new Semaphore(maxConcurrent);

                const promises = batch.map(key =>
                    semaphore.acquire().then(() =>
                        resolveAttributeName(key).finally(() => semaphore.release())
                    )
                );

                await Promise.allSettled(promises);
                resolvedCount += batch.length;
                updateLoading(3, (resolvedCount / totalToResolve) * 100);
            }

            for (let i = 0; i < keysArray.length; i += batchSize) {
                const batch = keysArray.slice(i, i + batchSize);
                await resolveBatchWithConcurrency(batch);
            }

            hideLoadingOverlay();
        }

        function truncate(str, len) {
            if (!str) return '';
            if (str.length <= len) return str;
            return str.substring(0, len - 3) + '...';
        }

        function calculateNodeDegrees() {
            const degreeMap = new Map();

            Object.entries(RAW_GRAPH_DATA).forEach(([nodeId, recordData]) => {
                const recordArray = recordData.record || [];
                let inDegree = 0;

                Object.values(RAW_GRAPH_DATA).forEach(otherRecord => {
                    const otherArray = otherRecord.record || [];
                    otherArray.forEach(attr => {
                        if (attr.value === nodeId) {
                            inDegree++;
                        }
                    });
                });

                const allPids = Object.keys(RAW_GRAPH_DATA);
                const outDegree = recordArray.filter(attr => allPids.includes(attr.value)).length;

                degreeMap.set(nodeId, {
                    total: inDegree + outDegree,
                    in: inDegree,
                    out: outDegree
                });
            });

            return degreeMap;
        }

        function identifySuperNodes(degreeMap) {
            const degrees = Array.from(degreeMap.values()).map(d => d.total);

            if (degrees.length === 0) {
                return { superNodes: new Set(), threshold: Infinity, mean: 0, stddev: 0 };
            }

            const mean = degrees.reduce((a, b) => a + b, 0) / degrees.length;
            const variance = degrees.reduce((sum, d) => sum + Math.pow(d - mean, 2), 0) / degrees.length;
            const stddev = Math.sqrt(variance);
            const threshold = mean + 1.5 * stddev;

            const superNodes = new Set();
            degreeMap.forEach((data, nodeId) => {
                if (data.total >= threshold) {
                    superNodes.add(nodeId);
                }
            });

            console.log(`Super-node analysis: ${superNodes.size}/${degrees.length} nodes identified (${(superNodes.size/degrees.length*100).toFixed(1)}%)`);
            console.log(`Threshold: ${threshold.toFixed(2)} connections (mean=${mean.toFixed(2)}, stddev=${stddev.toFixed(2)})`);

            return { superNodes, threshold, mean, stddev };
        }

            buttonRow.appendChild(clearBtn);

            content.appendChild(buttonRow);

            document.getElementById('focus-node-btn')?.addEventListener('click', function() {
                focusOnNode(node);
            });

            if (typeof customElements !== 'undefined') {
                if (customElements.get('pid-component')) {
                    customElements.upgrade(content);
                } else {
                    customElements.whenDefined('pid-component').then(() => {
                        customElements.upgrade(content);
                    });
                }
            }

            document.getElementById('details-panel').classList.add('open');

            setTimeout(() => {
                if (typeof customElements !== 'undefined' && customElements.get('pid-component')) {
                    customElements.upgrade(content);
                }
            }, 100);
        }

        function closeDetailsPanel() {
            document.getElementById('details-panel').classList.remove('open');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getPrimaryProfile(profiles, stats) {
            if (!profiles || profiles.length === 0) return null;
            if (profiles.length === 1) return profiles[0];

            return profiles.reduce((primary, current) => {
                const currentFreq = stats.frequencyMap.get(current) || Infinity;
                const primaryFreq = stats.frequencyMap.get(primary) || Infinity;
                return currentFreq < primaryFreq ? current : primary;
            });
        }

        function initProfileFilters() {
            const stats = window.profileStats;
            const container = document.getElementById('profile-filters');
            container.innerHTML = '';

            const primaryProfileGroups = new Map();

            Object.entries(RAW_GRAPH_DATA).forEach(([pid, recordData]) => {
                const profiles = extractProfilePids(recordData.record || []);
                if (profiles.length === 0) return;

                const primary = getPrimaryProfile(profiles, stats);
                if (!primaryProfileGroups.has(primary)) {
                    primaryProfileGroups.set(primary, {
                        nodeCount: 0,
                        allProfiles: new Set()
                    });
                }
                const group = primaryProfileGroups.get(primary);
                group.nodeCount++;
                profiles.forEach(p => group.allProfiles.add(p));
            });

            const sortedGroups = Array.from(primaryProfileGroups.entries())
                .sort((a, b) => b[1].nodeCount - a[1].nodeCount);

            visibleProfiles.clear();

            sortedGroups.forEach(([primaryPid, group]) => {
                const primaryMeta = attrMetaCache.get(primaryPid);
                const primaryName = primaryMeta?.name || truncatePid(primaryPid, 25);

                const groupDiv = document.createElement('div');
                groupDiv.className = 'profile-group';
                groupDiv.innerHTML = `
                    <div class="profile-group-header">
                        <span class="collapse-icon">▼</span>
                        <span class="group-name">${escapeHtml(primaryName)}</span>
                        <span class="group-count">(${group.nodeCount})</span>
                    </div>
                    <div class="profile-group-members">
                    </div>
                `;

                const membersContainer = groupDiv.querySelector('.profile-group-members');

                const sortedProfiles = Array.from(group.allProfiles)
                    .sort((a, b) => {
                        const freqA = stats.frequencyMap.get(a) || 0;
                        const freqB = stats.frequencyMap.get(b) || 0;
                        return freqA - freqB;
                    });

                sortedProfiles.forEach(profilePid => {
                    visibleProfiles.add(profilePid);
                    const meta = attrMetaCache.get(profilePid);
                    const displayName = meta?.name || truncatePid(profilePid, 25);
                    const isPrimary = profilePid === primaryPid;

                    const checkboxDiv = document.createElement('div');
                    checkboxDiv.className = `filter-checkbox${isPrimary ? ' primary-profile' : ''}`;
                    checkboxDiv.innerHTML = `
                        <label>
                            <input type="checkbox" class="profile-filter"
                                   data-profile="${escapeHtml(profilePid)}" checked>
                            <span>${escapeHtml(displayName)}${isPrimary ? ' ★' : ''}</span>
                        </label>
                    `;
                    membersContainer.appendChild(checkboxDiv);
                });

                const header = groupDiv.querySelector('.profile-group-header');
                header.addEventListener('click', () => {
                    const members = groupDiv.querySelector('.profile-group-members');
                    const icon = header.querySelector('.collapse-icon');
                    if (members.style.display === 'none') {
                        members.style.display = 'block';
                        icon.textContent = '▼';
                    } else {
                        members.style.display = 'none';
                        icon.textContent = '▶';
                    }
                });

                container.appendChild(groupDiv);
            });

            document.querySelectorAll('.profile-filter').forEach(checkbox => {
                checkbox.addEventListener('change', function() {
                    const profile = this.dataset.profile;
                    if (this.checked) {
                        visibleProfiles.add(profile);
                    } else {
                        visibleProfiles.delete(profile);
                    }
                    filterByProfile();
                });
            });
        }

        function initRelationshipFilters() {
            const container = document.getElementById('relationship-filters');
            container.innerHTML = '';

            const toggleDiv = document.createElement('div');
            toggleDiv.className = 'control-group';
            toggleDiv.innerHTML = `
                <label>
                    <input type="checkbox" id="show-all-edges" checked>
                    Show all edges
                </label>
            `;
            container.appendChild(toggleDiv);

            document.getElementById('show-all-edges').addEventListener('change', function() {
                if (this.checked) {
                    cy.edges().removeClass('hidden');
                } else {
                    cy.edges().addClass('hidden');
                }
            });

            const relationshipTypes = new Map();

            cy.edges().forEach(edge => {
                const key = edge.data('k');
                const meta = attrMetaCache.get(key) || { name: truncatePid(key) };

                if (!relationshipTypes.has(key)) {
                    relationshipTypes.set(key, {
                        pid: key,
                        name: meta.name,
                        count: 0,
                        failed: !meta.name || meta.name === truncatePid(key)
                    });
                }
                relationshipTypes.get(key).count++;
            });

            const hr = document.createElement('hr');
            hr.style.border = 'none';
            hr.style.borderTop = '1px solid #34495e';
            hr.style.margin = '10px 0';
            container.appendChild(hr);

            relationshipTypes.forEach((rel, pid) => {
                visibleRelationships.add(pid);
                const div = document.createElement('div');
                div.className = 'filter-checkbox';
                div.style.marginBottom = '5px';
                div.innerHTML = `
                    <label>
                        <input type="checkbox" class="relationship-filter"
                               data-pid="${escapeHtml(pid)}" checked>
                        <span>${escapeHtml(rel.name)} (${rel.count})</span>
                    </label>
                `;
                container.appendChild(div);
            });

            document.querySelectorAll('.relationship-filter').forEach(checkbox => {
                checkbox.addEventListener('change', function() {
                    const pid = this.dataset.pid;
                    if (this.checked) {
                        visibleRelationships.add(pid);
                    } else {
                        visibleRelationships.delete(pid);
                    }
                    filterByRelationship();
                });
            });
        }

        function filterByRelationship() {
            if (focusedNodeId) return;

            cy.edges().forEach(edge => {
                const relPid = edge.data('k');
                if (visibleRelationships.has(relPid)) {
                    edge.removeClass('hidden-relationship');
                } else {
                    edge.addClass('hidden-relationship');
                }
            });

            cy.nodes().forEach(node => {
                const hasVisibleEdge = node.connectedEdges().some(e => {
                    return !e.hasClass('hidden-relationship') &&
                           !e.hasClass('hidden') &&
                           !e.hasClass('hidden-profile');
                });

                const profiles = node.data('profiles') || [];
                const passesProfileFilter = profiles.some(p => visibleProfiles.has(p));

                if (!hasVisibleEdge && passesProfileFilter) {
                    node.addClass('hidden-isolated');
                } else {
                    node.removeClass('hidden-isolated');
                }
            });
        }

        function focusOnNode(node) {
            focusedNodeId = node.id();
            const connectedEdges = node.connectedEdges();
            const connectedNodes = connectedEdges.connectedNodes();

            cy.nodes().forEach(n => {
                if (n.id() === focusedNodeId || connectedNodes.has(n)) {
                    n.removeClass('hidden-focus');
                } else {
                    n.addClass('hidden-focus');
                }
            });

            cy.edges().forEach(e => {
                if (connectedEdges.has(e)) {
                    e.removeClass('hidden-focus');
                } else {
                    e.addClass('hidden-focus');
                }
            });

            const focusBtn = document.getElementById('focus-node-btn');
            const clearBtn = document.getElementById('clear-focus-btn');
            if (focusBtn) focusBtn.style.display = 'none';
            if (clearBtn) clearBtn.style.display = 'inline-block';

            cy.animate({
                fit: {
                    eles: node.union(connectedNodes),
                    padding: 50
                },
                duration: 500
            });
        }

        function clearFocus() {
            focusedNodeId = null;
            cy.elements().removeClass('hidden-focus');

            const focusBtn = document.getElementById('focus-node-btn');
            const clearBtn = document.getElementById('clear-focus-btn');
            if (focusBtn) focusBtn.style.display = 'inline-block';
            if (clearBtn) clearBtn.style.display = 'none';

            filterByProfile();
            filterByRelationship();
        }

        function filterByProfile() {
            if (focusedNodeId) return;

            cy.nodes().forEach(node => {
                const profiles = node.data('profiles') || [];
                const hasVisibleProfile = profiles.some(p => visibleProfiles.has(p));
                if (hasVisibleProfile) {
                    node.removeClass('hidden-profile');
                } else {
                    node.addClass('hidden-profile');
                }
            });

            cy.edges().forEach(edge => {
                const sourceVisible = !edge.source().hasClass('hidden-profile');
                const targetVisible = !edge.target().hasClass('hidden-profile');
                if (sourceVisible && targetVisible) {
                    edge.removeClass('hidden-profile');
                } else {
                    edge.addClass('hidden-profile');
                }
            });
        }

        let searchTimeout;
        document.getElementById('search-input').addEventListener('input', function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                performSearch(this.value);
            }, 300);
        });

        function performSearch(query) {
            if (!query.trim()) {
                cy.elements().removeClass('highlighted');
                return;
            }

            const lowerQuery = query.toLowerCase();

            cy.elements().removeClass('highlighted');

            const matches = cy.elements().filter(function() {
                const data = this.data();

                if (this.isNode()) {
                    return data.full_pid?.toLowerCase().includes(lowerQuery) ||
                           data.attrs?.some(attr =>
                               Array.isArray(attr.v) ? attr.v.some(v => v.toLowerCase().includes(lowerQuery)) : attr.v.toLowerCase().includes(lowerQuery)
                           );
                } else {
                    return data.label?.toLowerCase().includes(lowerQuery) ||
                           data.k?.toLowerCase().includes(lowerQuery);
                }
            });

            matches.addClass('highlighted');

            if (matches.length > 0) {
                cy.animate({
                    fit: {
                        eles: matches,
                        padding: 50
                    },
                    duration: 500
                });
            }
        }

        document.getElementById('layout-select').addEventListener('change', function() {
            const layout = this.value;
            console.log('Layout changed to:', layout);

            cy.layout({
                name: layout,
                animate: true,
                animationDuration: 500
            }).run();
        });

        document.querySelectorAll('[data-display]').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('[data-display]').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentDisplayMode = this.dataset.display;
                cy.style().update();
            });
        });

        document.getElementById('show-descriptions').addEventListener('change', function() {
            const node = cy.$(':selected').first();
            if (node.length > 0) {
                showNodeDetails(node);
            }
        });

        document.getElementById('export-svg').addEventListener('click', function() {
            try {
                const svgString = cy.svg();
                if (!svgString || typeof svgString !== 'string') {
                    throw new Error('Failed to generate SVG. The graph may be too large or complex.');
                }

                const blob = new Blob([svgString], { type: 'image/svg+xml' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.download = 'fdo_graph.svg';
                link.href = url;
                link.click();
                URL.revokeObjectURL(url);
            } catch (error) {
                console.error('SVG export failed:', error);
                alert(`SVG export failed: ${error.message}\n\nPlease try the PNG export option instead.`);
            }
        });

        document.getElementById('export-png').addEventListener('click', function() {
            const pngBase64 = cy.png({ full: true, bg: '#ffffff' });
            const link = document.createElement('a');
            link.download = 'fdo_graph.png';
            link.href = pngBase64;
            link.click();
        });

        document.getElementById('close-details').addEventListener('click', closeDetailsPanel);

        document.addEventListener('click', function(e) {
            if (e.target && e.target.id === 'clear-focus-btn') {
                clearFocus();
            }
        });

        const detailsPanel = document.getElementById('details-panel');

        detailsPanel.addEventListener('transitionend', function(e) {
            if (e.propertyName === 'right' && detailsPanel.classList.contains('open')) {
                const content = document.getElementById('details-content');
                if (content && typeof customElements !== 'undefined') {
                    if (customElements.get('pid-component')) {
                        customElements.upgrade(content);
                    } else {
                        customElements.whenDefined('pid-component').then(() => {
                            customElements.upgrade(content);
                        });
                    }
                }
            }
        });

        async function initializeGraph() {
            console.log('Building Cytoscape elements from raw JSON...');
            updateLoading(0, 100);

            setTimeout(async () => {
                updateLoading(1, 0);

                console.log('Analyzing profile distribution...');
                window.profileStats = calculateProfileFrequencies();
                console.log(`Found ${window.profileStats.frequencyMap.size} unique profiles across ${window.profileStats.totalNodes} nodes`);
                console.log('Profile frequency stats:', {
                    mean: window.profileStats.mean.toFixed(2),
                    median: window.profileStats.median,
                    stddev: window.profileStats.stddev.toFixed(2)
                });

                updateLoading(1, 50);

                const elements = buildCytoscapeElements();
                updateLoading(1, 100);

                setTimeout(async () => {
                    updateLoading(2, 0);
                    console.log('Collecting all attribute keys...');

                    await preloadAttributeMetadata(elements);

                    updateLoading(3, 100);
                    console.log('Initializing Cytoscape...');
                    initCytoscapeWithElements(elements);

                    // Initialize filters AFTER metadata resolution
                    updateLoading(4, 0);
                    console.log('Initializing hierarchical profile filters...');
                    initProfileFilters();
                    initRelationshipFilters();
                    updateLoading(4, 100);
                }, 100);
            }, 100);
        }

        // Initialize graph when DOM is ready
        document.addEventListener('DOMContentLoaded', async () => {
            await initializeGraph();
        });
        customElements.upgrade(document.querySelector('pid-component'));
    </script>
</body>
</html>
