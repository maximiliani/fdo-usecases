<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FDO Graph Visualization</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            overflow: hidden;
            background: #f5f6fa;
        }

        #container {
            display: flex;
            height: 100vh;
        }

        #control-panel {
            width: 280px;
            background: #2c3e50;
            color: white;
            padding: 20px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        #graph-container {
            flex: 1;
            position: relative;
        }

        #cy {
            width: 100%;
            height: 100%;
        }

        #details-panel {
            position: absolute;
            top: 0;
            right: -450px;
            width: 450px;
            height: 100%;
            background: white;
            box-shadow: -2px 0 10px rgba(0,0,0,0.2);
            transition: right 0.3s ease;
            overflow-y: auto;
            z-index: 100;
        }

        #details-panel.open {
            right: 0;
        }

        .panel-header {
            background: #34495e;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header h3 {
            font-size: 18px;
            font-weight: 600;
        }

        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }

        .close-btn:hover {
            opacity: 0.8;
        }

        .panel-content {
            padding: 20px;
        }

        .control-section {
            margin-bottom: 25px;
        }

        .control-section h4 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            color: #bdc3c7;
        }

        .control-group {
            margin-bottom: 10px;
        }

        .control-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .control-group input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        select {
            width: 100%;
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            background: #34495e;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        select:focus {
            outline: 2px solid #3498db;
        }

        .btn {
            width: 100%;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 8px;
            transition: background 0.2s;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background: #2980b9;
        }

        .btn-secondary {
            background: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
        }

        .btn-group {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }

        .btn-group .btn {
            flex: 1;
            margin-bottom: 0;
        }

        .btn-group .btn.active {
            background: #27ae60;
        }

        #search-input {
            width: 100%;
            padding: 10px 12px;
            border: none;
            border-radius: 4px;
            background: #34495e;
            color: white;
            font-size: 14px;
            margin-bottom: 10px;
        }

        #search-input::placeholder {
            color: #95a5a6;
        }

        #search-input:focus {
            outline: 2px solid #3498db;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .legend-node {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .legend-node.zenodo {
            background: #3498db;
            border-radius: 50%;
        }

        .legend-node.md5 {
            background: #2ecc71;
            border-radius: 2px;
        }

        .legend-node.handle {
            background: #e67e22;
            transform: rotate(45deg);
            border-radius: 2px;
            margin: 5px;
        }

        .legend-node.other {
            background: #9b59b6;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            width: 20px;
            height: 20px;
        }

        .legend-edge {
            width: 30px;
            height: 3px;
            flex-shrink: 0;
        }

        .legend-edge.version {
            background: #e74c3c;
        }

        .legend-edge.file {
            background: #27ae60;
        }

        .legend-edge.citation {
            background: #2980b9;
        }

        .legend-edge.other {
            background: #95a5a6;
        }

        .detail-row {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #ecf0f1;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-size: 12px;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 14px;
            color: #2c3e50;
            word-break: break-word;
        }

        .detail-value.pid {
            font-family: 'Courier New', monospace;
            background: #f8f9fa;
            padding: 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .profile-badge {
            display: inline-block;
            background: #3498db;
            color: white;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 12px;
            margin-right: 5px;
            margin-bottom: 5px;
        }

        .attribute-list {
            list-style: none;
        }

        .attribute-item {
            padding: 10px;
            background: #f8f9fa;
            border-radius: 4px;
            margin-bottom: 8px;
            border-left: 3px solid #3498db;
        }

        .attribute-key {
            font-weight: 600;
            color: #2c3e50;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .attribute-value {
            font-size: 12px;
            color: #7f8c8d;
            word-break: break-all;
            font-family: 'Courier New', monospace;
        }

        .attribute-values ul {
            list-style-type: disc;
            margin: 5px 0 0 20px;
            padding: 0;
        }

        .attribute-values li {
            margin-bottom: 4px;
        }

        .attribute-description {
            font-size: 11px;
            color: #95a5a6;
            margin-top: 4px;
            font-style: italic;
        }

        .stats-box {
            background: #34495e;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .stat-item:last-child {
            margin-bottom: 0;
        }

        .stat-label {
            color: #bdc3c7;
        }

        .stat-value {
            color: white;
            font-weight: 600;
        }

        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(44, 62, 80, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            font-size: 18px;
        }

        #loading-overlay.hidden {
            display: none;
        }

        .filter-checkbox {
            margin-bottom: 8px;
        }

        .filter-checkbox label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .type-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .type-indicator.zenodo { background: #3498db; }
        .type-indicator.md5 { background: #2ecc71; }
        .type-indicator.handle { background: #e67e22; }
        .type-indicator.other { background: #9b59b6; }
    </style>
</head>
<body>
    <div id="loading-overlay">Loading graph...</div>

    <div id="container">
        <div id="control-panel">
            <h2 style="margin-bottom: 20px; font-size: 20px;">FDO Graph Viewer</h2>

            <div class="stats-box" id="stats-box">
                <div class="stat-item">
                    <span class="stat-label">Nodes:</span>
                    <span class="stat-value" id="stat-nodes">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Edges:</span>
                    <span class="stat-value" id="stat-edges">-</span>
                </div>
            </div>

            <div class="control-section">
                <h4>Search</h4>
                <input type="text" id="search-input" placeholder="Search by PID or attribute...">
            </div>

            <div class="control-section">
                <h4>Layout</h4>
                <select id="layout-select">
                    <option value="cose">Force-Directed (CoSE)</option>
                    <option value="grid">Grid</option>
                    <option value="circle">Circle</option>
                    <option value="dagre">Hierarchical</option>
                </select>
            </div>

            <div class="control-section">
                <h4>Edge Labels</h4>
                <div class="btn-group">
                    <button class="btn btn-secondary" data-display="pid">PID</button>
                    <button class="btn btn-secondary active" data-display="name">Name</button>
                    <button class="btn btn-secondary" data-display="combined">Both</button>
                </div>
            </div>

            <div class="control-section">
                <h4>Show Details</h4>
                <div class="control-group">
                    <label>
                        <input type="checkbox" id="show-descriptions" checked>
                        Attribute descriptions
                    </label>
                </div>
            </div>

            <div class="control-section">
                <h4>Filter by Type</h4>
                <div class="filter-checkbox">
                    <label>
                        <input type="checkbox" class="type-filter" data-type="zenodo" checked>
                        <span class="type-indicator zenodo"></span> Zenodo
                    </label>
                </div>
                <div class="filter-checkbox">
                    <label>
                        <input type="checkbox" class="type-filter" data-type="md5" checked>
                        <span class="type-indicator md5"></span> MD5 Files
                    </label>
                </div>
                <div class="filter-checkbox">
                    <label>
                        <input type="checkbox" class="type-filter" data-type="handle" checked>
                        <span class="type-indicator handle"></span> Handle
                    </label>
                </div>
                <div class="filter-checkbox">
                    <label>
                        <input type="checkbox" class="type-filter" data-type="other" checked>
                        <span class="type-indicator other"></span> Other
                    </label>
                </div>
            </div>

            <div class="control-section">
                <h4>Legend</h4>
                <div class="legend-item">
                    <div class="legend-node zenodo"></div>
                    <span>Zenodo Record</span>
                </div>
                <div class="legend-item">
                    <div class="legend-node md5"></div>
                    <span>MD5 File</span>
                </div>
                <div class="legend-item">
                    <div class="legend-node handle"></div>
                    <span>Handle PID</span>
                </div>
                <hr style="border: none; border-top: 1px solid #34495e; margin: 10px 0;">
                <div class="legend-item">
                    <div class="legend-edge version"></div>
                    <span>Version Link</span>
                </div>
                <div class="legend-item">
                    <div class="legend-edge file"></div>
                    <span>File Link</span>
                </div>
                <div class="legend-item">
                    <div class="legend-edge citation"></div>
                    <span>Citation</span>
                </div>
                <div class="legend-item">
                    <div class="legend-edge other"></div>
                    <span>Other</span>
                </div>
            </div>

            <div class="control-section">
                <h4>Export</h4>
                <button class="btn btn-primary" id="export-svg">Export SVG</button>
                <button class="btn btn-primary" id="export-png">Export PNG</button>
            </div>
        </div>

        <div id="graph-container">
            <div id="cy"></div>
            <div id="details-panel">
                <div class="panel-header">
                    <h3>FDO Details</h3>
                    <button class="close-btn" id="close-details">&times;</button>
                </div>
                <div class="panel-content" id="details-content">
                    <p style="color: #95a5a6; text-align: center; margin-top: 50px;">
                        Click on a node to view details
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Graph data injected from Python
        const GRAPH_DATA = $graph_json;
        const ATTR_DEFS = $attr_defs_json;  // Separate attribute definitions
        const DEFAULT_LAYOUT = '$layout_algorithm';
        const ENABLE_SVG_EXPORT = '$export_svg' === 'true';

        let cy;
        let currentDisplayMode = 'name';
        let visibleTypes = new Set(['zenodo', 'md5', 'handle', 'other']);

        // Lookup helper for attribute metadata
        function getAttrMeta(key) {
            return ATTR_DEFS[key] || { name: key, description: '' };
        }

        // Initialize Cytoscape
        function initCytoscape() {
            cy = cytoscape({
                container: document.getElementById('cy'),
                elements: GRAPH_DATA.elements,
                style: [
                    {
                        selector: 'node',
                        style: {
                            'background-color': getNodeColor,
                            'shape': getNodeShape,
                            'label': 'data(label)',
                            'font-size': '12px',
                            'color': '#2c3e50',
                            'text-valign': 'bottom',
                            'text-halign': 'center',
                            'width': 60,
                            'height': 60,
                            'border-width': 2,
                            'border-color': '#2c3e50',
                            'text-wrap': 'wrap',
                            'text-max-width': '80px'
                        }
                    },
                    {
                        selector: 'node:selected',
                        style: {
                            'border-width': 4,
                            'border-color': '#e74c3c',
                            'scale': 1.1
                        }
                    },
                    {
                        selector: 'edge',
                        style: {
                            'width': 2,
                            'line-color': getEdgeColor,
                            'target-arrow-color': getEdgeColor,
                            'target-arrow-shape': 'triangle',
                            'curve-style': 'bezier',
                            'label': getEdgeLabel,
                            'font-size': '10px',
                            'color': '#7f8c8d',
                            'text-rotation': 'autorotate',
                            'text-margin-y': -5
                        }
                    },
                    {
                        selector: 'edge.highlighted',
                        style: {
                            'width': 4,
                            'opacity': 1
                        }
                    },
                    {
                        selector: 'node.hidden',
                        style: {
                            'display': 'none'
                        }
                    },
                    {
                        selector: 'edge.hidden',
                        style: {
                            'display': 'none'
                        }
                    }
                ],
                layout: {
                    name: DEFAULT_LAYOUT,
                    animate: true,
                    animationDuration: 500,
                    ready: function() {
                        document.getElementById('loading-overlay').classList.add('hidden');
                    }
                },
                wheelSensitivity: 0.3,
                minZoom: 0.1,
                maxZoom: 3
            });

            // Update statistics
            updateStatistics();

            // Node click handler
            cy.on('tap', 'node', function(evt) {
                showNodeDetails(evt.target);
            });

            // Close details panel when clicking on background
            cy.on('tap', function(evt) {
                if (evt.target === cy) {
                    closeDetailsPanel();
                }
            });
        }

        function getNodeColor(node) {
            const type = node.data('type');
            const colors = {
                zenodo: '#3498db',
                md5: '#2ecc71',
                handle: '#e67e22',
                other: '#9b59b6'
            };
            return colors[type] || '#95a5a6';
        }

        function getNodeShape(node) {
            const type = node.data('type');
            const shapes = {
                zenodo: 'ellipse',
                md5: 'rectangle',
                handle: 'diamond',
                other: 'hexagon'
            };
            return shapes[type] || 'ellipse';
        }

        function getEdgeColor(edge) {
            const type = edge.data('relationship_type');
            const colors = {
                version: '#e74c3c',
                file: '#27ae60',
                citation: '#2980b9',
                other: '#95a5a6'
            };
            return colors[type] || '#95a5a6';
        }

        function getEdgeLabel(edge) {
            const mode = currentDisplayMode;
            const key = edge.data('k') || '';
            const meta = getAttrMeta(key);
            const name = meta.name || '';

            if (mode === 'pid') {
                return truncate(key, 20);
            } else if (mode === 'name') {
                return truncate(name, 20);
            } else {
                return name ? `${name}` : truncate(key, 20);
            }
        }

        function truncate(str, len) {
            if (!str) return '';
            if (str.length <= len) return str;
            return str.substring(0, len - 3) + '...';
        }

        function updateStatistics() {
            const nodes = cy.nodes().length;
            const edges = cy.edges().length;
            document.getElementById('stat-nodes').textContent = nodes;
            document.getElementById('stat-edges').textContent = edges;
        }

        function showNodeDetails(node) {
            const data = node.data();
            const content = document.getElementById('details-content');

            const profilesHtml = data.profiles && data.profiles.length > 0
                ? data.profiles.map(p => `<span class="profile-badge">${escapeHtml(p)}</span>`).join('')
                : '<span style="color: #95a5a6;">None</span>';

            // Use separate attribute definitions lookup
            const attrs = data.attrs || [];
            const attributesHtml = attrs.length > 0
                ? `<ul class="attribute-list">
                    ${attrs.map(attr => {
                        const meta = getAttrMeta(attr.k);
                        const hasMultiple = attr.c && attr.c > 1;
                        const values = Array.isArray(attr.v) ? attr.v : [attr.v];
                        return `
                        <li class="attribute-item">
                            <div class="attribute-key">${escapeHtml(meta.name)} <span style="color: #95a5a6; font-weight: normal;">(${attr.c || 1} ${hasMultiple ? 'values' : 'value'})</span></div>
                            ${!hasMultiple
                                ? `<div class="attribute-value">${escapeHtml(values[0])}</div>`
                                : `<div class="attribute-values">
                                    <ul>
                                        ${values.map(v => `<li><span class="attribute-value">${escapeHtml(v)}</span></li>`).join('')}
                                    </ul>
                                   </div>`
                            }
                            ${document.getElementById('show-descriptions').checked && meta.description ?
                                `<div class="attribute-description">${escapeHtml(meta.description)}</div>` : ''}
                        </li>`;
                    }).join('')}
                   </ul>`
                : '<p style="color: #95a5a6;">No attributes</p>';

            const uniqueAttrCount = attrs.length;
            const totalCount = attrs.reduce((sum, a) => sum + (a.c || 1), 0);

            content.innerHTML = `
                <div class="detail-row">
                    <div class="detail-label">PID</div>
                    <div class="detail-value pid">${escapeHtml(data.full_pid || data.id)}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Type</div>
                    <div class="detail-value">${escapeHtml(data.type)}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Profiles</div>
                    <div class="detail-value">${profilesHtml}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Attributes (${uniqueAttrCount} unique, ${totalCount} total)</div>
                    ${attributesHtml}
                </div>
            `;

            document.getElementById('details-panel').classList.add('open');
        }

        function closeDetailsPanel() {
            document.getElementById('details-panel').classList.remove('open');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Layout change handler
        document.getElementById('layout-select').addEventListener('change', function() {
            const layout = this.value;
            cy.layout({
                name: layout,
                animate: true,
                animationDuration: 500
            }).run();
        });

        // Display mode handlers
        document.querySelectorAll('[data-display]').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('[data-display]').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentDisplayMode = this.dataset.display;
                cy.style().update();
            });
        });

        // Description toggle
        document.getElementById('show-descriptions').addEventListener('change', function() {
            const node = cy.$(':selected').first();
            if (node.length > 0) {
                showNodeDetails(node);
            }
        });

        // Type filters
        document.querySelectorAll('.type-filter').forEach(checkbox => {
            checkbox.addEventListener('change', function() {
                const type = this.dataset.type;
                if (this.checked) {
                    visibleTypes.add(type);
                } else {
                    visibleTypes.delete(type);
                }
                filterByType();
            });
        });

        function filterByType() {
            cy.nodes().forEach(node => {
                const type = node.data('type');
                if (visibleTypes.has(type)) {
                    node.removeClass('hidden');
                } else {
                    node.addClass('hidden');
                }
            });

            cy.edges().forEach(edge => {
                const sourceVisible = visibleTypes.has(edge.source().data('type'));
                const targetVisible = visibleTypes.has(edge.target().data('type'));
                if (sourceVisible && targetVisible) {
                    edge.removeClass('hidden');
                } else {
                    edge.addClass('hidden');
                }
            });
        }

        // Search functionality
        let searchTimeout;
        document.getElementById('search-input').addEventListener('input', function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                performSearch(this.value);
            }, 300);
        });

        function performSearch(query) {
            if (!query.trim()) {
                cy.elements().removeClass('highlighted');
                return;
            }

            const lowerQuery = query.toLowerCase();

            cy.elements().removeClass('highlighted');

            const matches = cy.elements().filter(function() {
                const data = this.data();

                if (this.isNode()) {
                    return data.full_pid?.toLowerCase().includes(lowerQuery) ||
                           data.type?.toLowerCase().includes(lowerQuery) ||
                           data.attrs?.some(attr =>
                               Array.isArray(attr.v) ? attr.v.some(v => v.toLowerCase().includes(lowerQuery)) : attr.v.toLowerCase().includes(lowerQuery)
                           );
                } else {
                    return data.label?.toLowerCase().includes(lowerQuery) ||
                           data.k?.toLowerCase().includes(lowerQuery);
                }
            });

            matches.addClass('highlighted');

            if (matches.length > 0) {
                cy.animate({
                    fit: {
                        eles: matches,
                        padding: 50
                    },
                    duration: 500
                });
            }
        }

        // Export functions
        document.getElementById('export-svg').addEventListener('click', function() {
            const svgBlob = cy.svg({ scale: 1, full: true });
            const url = URL.createObjectURL(svgBlob);
            const link = document.createElement('a');
            link.download = 'fdo_graph.svg';
            link.href = url;
            link.click();
            URL.revokeObjectURL(url);
        });

        document.getElementById('export-png').addEventListener('click', function() {
            const pngBase64 = cy.png({ full: true, bg: '#ffffff' });
            const link = document.createElement('a');
            link.download = 'fdo_graph.png';
            link.href = pngBase64;
            link.click();
        });

        // Close details button
        document.getElementById('close-details').addEventListener('click', closeDetailsPanel);

        // Load Cytoscape and extensions
        function loadScripts() {
            console.log('Loading Cytoscape scripts...');
            const scripts = [
                'https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js',
                'https://cdn.jsdelivr.net/npm/cytoscape-cose-bilkent@4.1.0/cytoscape-cose-bilkent.min.js'
            ];

            let loaded = 0;

            scripts.forEach((src, idx) => {
                const script = document.createElement('script');
                script.src = src;
                script.onerror = (err) => {
                    console.error('Failed to load script:', src, err);
                    document.getElementById('loading-overlay').innerHTML =
                        'Error loading: ' + src.split('/').pop();
                };
                script.onload = () => {
                    loaded++;
                    console.log(`Loaded ${idx + 1}/${scripts.length}: ${src.split('/').pop()}`);
                    if (loaded === scripts.length) {
                        console.log('All scripts loaded, initializing Cytoscape...');
                        try {
                            initCytoscape();
                        } catch (e) {
                            console.error('Error initializing Cytoscape:', e);
                            document.getElementById('loading-overlay').innerHTML =
                                'Error: ' + e.message;
                        }
                    }
                };
                document.head.appendChild(script);
            });
        }

        // Start loading
        loadScripts();
    </script>
</body>
</html>
